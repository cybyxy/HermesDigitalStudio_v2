name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Lint check
        working-directory: backend
        run: uv run ruff check src/

      - name: Format check
        working-directory: backend
        run: uv run ruff format --check src/

  backend-test:
    name: Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install backend dependencies
        working-directory: backend
        run: |
          uv sync
          uv pip install pytest pytest-asyncio pytest-cov pytest-mock httpx

      - name: Run backend unit tests
        working-directory: backend
        run: uv run python -m pytest tests/unit/ -v --tb=short --cov=src/backend --cov-report=term

  backend-integration:
    name: Backend Integration Tests (Neo4j)
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install backend dependencies
        working-directory: backend
        run: |
          uv sync
          uv pip install pytest pytest-asyncio

      - name: Start Neo4j
        run: |
          docker compose up -d neo4j
          echo "Waiting for Neo4j to be ready..."
          until docker compose exec -T neo4j cypher-shell -u neo4j -p bobo1234 "RETURN 1" > /dev/null 2>&1; do
            sleep 2
          done
          echo "Neo4j is ready"

      - name: Run integration tests
        working-directory: backend
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_PASSWORD: bobo1234
        run: uv run python -m pytest tests/integration/ -v --tb=short

  frontend-typecheck:
    name: Frontend TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: frontend
        run: npm run build
