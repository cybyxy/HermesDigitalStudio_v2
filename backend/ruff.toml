# Ruff Python Linter & Formatter Configuration
# https://docs.astral.sh/ruff/

# -------------------------------------------------------
# 基础配置
# -------------------------------------------------------
line-length = 100
target-version = "py311"
indent-width = 4

# -------------------------------------------------------
# 规则选择
# -------------------------------------------------------
[lint]
# 启用推荐的规则集
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "DTZ",    # flake8-datetimez
    "T10",    # flake8-debugger
    "ISC",    # flake8-implicit-str-concat
    "PIE",    # flake8-pie
    "RET",    # flake8-return
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "RUF",    # Ruff specific rules
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "T201",   # print found
    "B008",   # do not perform calls in argument defaults
    "RUF001", # ambiguous fullwidth chars — 中文项目中文档字符串涉及全角标点，属正常
    "RUF002", # ambiguous fullwidth chars — 同上
]

[lint.isort]
# isort 配置
force-single-line = false
lines-after-imports = 2

[lint.per-file-ignores]
# 测试文件特殊处理
"tests/**" = ["S101", "T20"]  # 允许 assert 和 print in tests

# -------------------------------------------------------
# 格式化配置
# -------------------------------------------------------
[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
