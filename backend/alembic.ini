# Alembic 数据库迁移配置
# 运行方式: cd backend && alembic upgrade head

[alembic]
# 迁移脚本目录
script_location = alembic

# 日志配置
prepend_sys_path = . ; src

# sqlalchemy.url 由 env.py 动态设置（从 studio.yaml 读取）
# 此处留空，避免硬编码

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
